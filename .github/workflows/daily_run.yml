name: FAIV Social Media Daily Run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5,6 * * 1-5"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Write Google client secrets and token
        run: |
          printf '%s' "$GOOGLE_CLIENT_SECRETS_JSON" > client_secrets.json
          printf '%s' "$GOOGLE_TOKEN_JSON" > .google_token.json
        env:
          GOOGLE_CLIENT_SECRETS_JSON: ${{ secrets.GOOGLE_CLIENT_SECRETS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}

      - name: Skip outside 07:00 Stockholm
        id: stockholm-time
        run: |
          python - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os
          now = datetime.now(ZoneInfo("Europe/Stockholm"))
          should_run = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch" or now.hour == 7
          print(f"now={now.isoformat()}")
          with open("stockholm_time.env", "w", encoding="utf-8") as fh:
              fh.write(f"SHOULD_RUN={'true' if should_run else 'false'}
")
          PY
          cat stockholm_time.env >> "$GITHUB_ENV"

      - name: Run pipeline
        if: env.SHOULD_RUN == 'true'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_CLIENT_SECRETS_FILE: client_secrets.json
          GOOGLE_TOKEN_FILE: .google_token.json
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_OUTPUT_FOLDER_ID: ${{ secrets.GOOGLE_OUTPUT_FOLDER_ID }}
          GOOGLE_ASSET_ROOT_FOLDER_ID: ${{ secrets.GOOGLE_ASSET_ROOT_FOLDER_ID }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PREFIX: ${{ secrets.R2_PREFIX }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
        run: python -m src.main run
